const edgeLabel = document.getElementById('edge-label');
const infoPanel = document.getElementById('info-panel');
const searchInput = document.getElementById('search');

// State
let pan = { x: 0, y: 0 };
let zoom = 1;
let isPanning = false;
let panStart = { x: 0, y: 0 };
let draggingNode = null;
let dragOffset = { x: 0, y: 0 };
let nodePositions = {};
let nodeElements = {};
let selectedNode = null;

// Build adjacency
const outgoing = {};
const incoming = {};
const sectionKeys = Object.keys(sections);
sectionKeys.forEach(k => { outgoing[k] = []; incoming[k] = []; });
edges.forEach(([src, tgt, reason]) => {
  if (outgoing[src]) outgoing[src].push({ target: tgt, reason });
  if (incoming[tgt]) incoming[tgt].push({ source: src, reason });
});

// Layout: group by part, arrange in clusters
function initialLayout() {
  const partGroups = {};
  sectionKeys.forEach(k => {
    const p = sections[k].part;
    if (!partGroups[p]) partGroups[p] = [];
    partGroups[p].push(k);
  });

  const partOrder = Object.keys(partColors);
  const totalWidth = 5000;
  const totalHeight = 3200;

  // Arrange parts in a grid-like layout
  const partLayouts = [
    { part: "Part 1: General Provisions", cx: 500, cy: 250, spread: 220 },
    { part: "Part 2: Works Council", cx: 1800, cy: 1000, spread: 200 },
    { part: "Part 3: Youth & Trainee", cx: 4500, cy: 800, spread: 210 },
    { part: "Part 4: Co-determination", cx: 2800, cy: 3200, spread: 190 },
    { part: "Part 5: Special Regulations", cx: 5600, cy: 2600, spread: 220 },
    { part: "Part 6: Offences", cx: 5800, cy: 500, spread: 200 },
    { part: "Part 8: Transitional & Final", cx: 6200, cy: 1600, spread: 210 },
  ];

  partLayouts.forEach(({ part, cx, cy, spread }) => {
    const members = partGroups[part] || [];
    const cols = Math.ceil(Math.sqrt(members.length * 1.5));
    members.forEach((k, i) => {
      const row = Math.floor(i / cols);
      const col = i % cols;
      nodePositions[k] = {
        x: cx + (col - cols/2) * spread + (Math.random() - 0.5) * 30,
        y: cy + row * 110 + (Math.random() - 0.5) * 20
      };
    });
  });
}

function createNodes() {
  sectionKeys.forEach(k => {
    const sec = sections[k];
    const node = document.createElement('div');
    node.className = 'node';
    node.dataset.id = k;
    const color = partColors[sec.part] || '#888';
    node.style.background = color + '22';
    node.style.borderColor = color + '66';
    node.innerHTML = `<div class="sec-num" style="color:${color}">&sect;${k}</div><div class="sec-title">${sec.title}</div>`;

    node.addEventListener('mousedown', onNodeMouseDown);
    node.addEventListener('click', (e) => { if (!node._dragged) selectNode(k); });

    container.appendChild(node);
    nodeElements[k] = node;
  });
}

function updateNodePositions() {
  sectionKeys.forEach(k => {
    const el = nodeElements[k];
    const pos = nodePositions[k];
    const sx = pos.x * zoom + pan.x;
    const sy = pos.y * zoom + pan.y;
    el.style.transform = `translate(${sx}px, ${sy}px) scale(${zoom})`;
    el.style.transformOrigin = '0 0';
  });
}

function drawEdges() {
  // Clear
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Defs for markers
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  marker.setAttribute('id', 'arrow');
  marker.setAttribute('viewBox', '0 0 10 10');
  marker.setAttribute('refX', '10');
  marker.setAttribute('refY', '5');
  marker.setAttribute('markerWidth', '6');
  marker.setAttribute('markerHeight', '6');
  marker.setAttribute('orient', 'auto-start-reverse');
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
  path.setAttribute('fill', 'rgba(255,255,255,0.3)');
  marker.appendChild(path);
  defs.appendChild(marker);
  svg.appendChild(defs);

  edges.forEach(([src, tgt, reason], idx) => {
    if (!nodePositions[src] || !nodePositions[tgt]) return;
    const srcEl = nodeElements[src];
    const tgtEl = nodeElements[tgt];
    if (!srcEl || !tgtEl) return;

    const sx = nodePositions[src].x * zoom + pan.x + (srcEl.offsetWidth * zoom) / 2;
    const sy = nodePositions[src].y * zoom + pan.y + (srcEl.offsetHeight * zoom) / 2;
    const tx = nodePositions[tgt].x * zoom + pan.x + (tgtEl.offsetWidth * zoom) / 2;
    const ty = nodePositions[tgt].y * zoom + pan.y + (tgtEl.offsetHeight * zoom) / 2;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', sx);
    line.setAttribute('y1', sy);
    line.setAttribute('x2', tx);
    line.setAttribute('y2', ty);

    const isHighlighted = selectedNode && (src === selectedNode || tgt === selectedNode);
    line.setAttribute('stroke', isHighlighted ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.08)');
    line.setAttribute('stroke-width', isHighlighted ? '2' : '1');
    line.setAttribute('marker-end', 'url(#arrow)');
    line.dataset.src = src;
    line.dataset.tgt = tgt;
    line.dataset.reason = reason;
    line.dataset.idx = idx;

    line.addEventListener('mouseenter', (e) => {
      edgeLabel.textContent = `${src} -> ${tgt}: ${reason}`;
      edgeLabel.style.display = 'block';
      edgeLabel.style.left = e.clientX + 10 + 'px';
      edgeLabel.style.top = e.clientY - 20 + 'px';
    });
    line.addEventListener('mousemove', (e) => {
      edgeLabel.style.left = e.clientX + 10 + 'px';
      edgeLabel.style.top = e.clientY - 20 + 'px';
    });
    line.addEventListener('mouseleave', () => {
      edgeLabel.style.display = 'none';
    });

    svg.appendChild(line);
  });
}

function render() {
  updateNodePositions();
  drawEdges();
}

// Node dragging
function onNodeMouseDown(e) {
  e.stopPropagation();
  const node = e.currentTarget;
  const id = node.dataset.id;
  draggingNode = id;
  node._dragged = false;
  const pos = nodePositions[id];
  dragOffset.x = e.clientX - (pos.x * zoom + pan.x);
  dragOffset.y = e.clientY - (pos.y * zoom + pan.y);
  node.classList.add('dragging');
}

document.addEventListener('mousemove', (e) => {
  if (draggingNode) {
    const node = nodeElements[draggingNode];
    node._dragged = true;
    nodePositions[draggingNode].x = (e.clientX - dragOffset.x - pan.x) / zoom;
    nodePositions[draggingNode].y = (e.clientY - dragOffset.y - pan.y) / zoom;
    render();
  } else if (isPanning) {
    pan.x += e.clientX - panStart.x;
    pan.y += e.clientY - panStart.y;
    panStart.x = e.clientX;
    panStart.y = e.clientY;
    render();
  }
});

document.addEventListener('mouseup', () => {
  if (draggingNode) {
    nodeElements[draggingNode].classList.remove('dragging');
    draggingNode = null;
  }
  isPanning = false;
  container.classList.remove('grabbing');
});

// Pan
container.addEventListener('mousedown', (e) => {
  if (e.target === container || e.target === svg) {
    isPanning = true;
    panStart.x = e.clientX;
    panStart.y = e.clientY;
    container.classList.add('grabbing');
  }
});

// Zoom (wheel + trackpad pinch)
function applyZoom(centerX, centerY, delta) {
  const oldZoom = zoom;
  zoom *= delta;
  zoom = Math.max(0.1, Math.min(3, zoom));
  const rect = container.getBoundingClientRect();
  const mx = centerX - rect.left;
  const my = centerY - rect.top;
  pan.x = mx - (mx - pan.x) * (zoom / oldZoom);
  pan.y = my - (my - pan.y) * (zoom / oldZoom);
  render();
}

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  // ctrlKey is set for trackpad pinch on macOS/Chrome
  if (e.ctrlKey) {
    applyZoom(e.clientX, e.clientY, 1 - e.deltaY * 0.01);
  } else {
    applyZoom(e.clientX, e.clientY, 1 - e.deltaY * 0.001);
  }
}, { passive: false });

// Safari gesture events (pinch on trackpad)
container.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
container.addEventListener('gesturechange', (e) => {
  e.preventDefault();
  applyZoom(e.clientX, e.clientY, e.scale > 1 ? 1.03 : 0.97);
}, { passive: false });
container.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });

// Touch pinch (mobile/tablet)
let lastTouchDist = 0;
let lastTouchCenter = { x: 0, y: 0 };
let touchPanning = false;
let lastTouchPos = { x: 0, y: 0 };

container.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.hypot(dx, dy);
    lastTouchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  } else if (e.touches.length === 1) {
    touchPanning = true;
    lastTouchPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: false });

container.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const center = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
    if (lastTouchDist > 0) {
      applyZoom(center.x, center.y, dist / lastTouchDist);
    }
    // Also pan with two fingers
    pan.x += center.x - lastTouchCenter.x;
    pan.y += center.y - lastTouchCenter.y;
    lastTouchDist = dist;
    lastTouchCenter = center;
    render();
  } else if (e.touches.length === 1 && touchPanning) {
    pan.x += e.touches[0].clientX - lastTouchPos.x;
    pan.y += e.touches[0].clientY - lastTouchPos.y;
    lastTouchPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    render();
  }
}, { passive: false });

container.addEventListener('touchend', () => {
  lastTouchDist = 0;
  touchPanning = false;
});

function zoomIn() { zoom = Math.min(3, zoom * 1.3); render(); }
function zoomOut() { zoom = Math.max(0.1, zoom / 1.3); render(); }
function resetView() { zoom = 0.35; pan = { x: 50, y: 50 }; render(); }

// Orphan filter
let orphansHidden = false;
const orphanNodes = new Set(sectionKeys.filter(k => !outgoing[k]?.length && !incoming[k]?.length));

function toggleOrphans() {
  orphansHidden = !orphansHidden;
  document.getElementById('hide-orphans-btn').textContent = orphansHidden ? 'Show orphans' : 'Hide orphans';
  orphanNodes.forEach(k => {
    nodeElements[k].style.display = orphansHidden ? 'none' : '';
  });
  render();
}

// Select node
function selectNode(id) {
  selectedNode = id;
  const sec = sections[id];

  // Highlight connected
  const connected = new Set([id]);
  outgoing[id]?.forEach(e => connected.add(e.target));
  incoming[id]?.forEach(e => connected.add(e.source));

  sectionKeys.forEach(k => {
    nodeElements[k].classList.toggle('highlighted', connected.has(k) && k !== id);
    nodeElements[k].classList.toggle('dimmed', !connected.has(k));
  });
  nodeElements[id].classList.remove('dimmed');
  nodeElements[id].classList.add('highlighted');

  // Info panel
  infoPanel.style.display = 'block';
  document.getElementById('info-title').textContent = `\u00A7${id} ${sec.title}`;
  document.getElementById('info-part').textContent = sec.part + (sec.div ? ' / ' + sec.div : '');

  let refsHTML = '';
  if (outgoing[id]?.length) {
    refsHTML += '<div class="ref-dir">References to:</div>';
    outgoing[id].forEach(e => {
      refsHTML += `<div class="ref-item" onclick="focusNode('${e.target}')">\u00A7${e.target} ${sections[e.target]?.title || ''}<br><small style="opacity:0.5">${e.reason}</small></div>`;
    });
  }
  if (incoming[id]?.length) {
    refsHTML += '<div class="ref-dir">Referenced by:</div>';
    incoming[id].forEach(e => {
      refsHTML += `<div class="ref-item" onclick="focusNode('${e.source}')">\u00A7${e.source} ${sections[e.source]?.title || ''}<br><small style="opacity:0.5">${e.reason}</small></div>`;
    });
  }
  if (!outgoing[id]?.length && !incoming[id]?.length) {
    refsHTML = '<div style="opacity:0.5;margin-top:10px">No cross-references</div>';
  }
  document.getElementById('info-refs').innerHTML = refsHTML;

  render();
}

function focusNode(id) {
  const pos = nodePositions[id];
  if (!pos) return;
  pan.x = window.innerWidth / 2 - pos.x * zoom;
  pan.y = window.innerHeight / 2 - pos.y * zoom;
  selectNode(id);
}

// Click background to deselect
container.addEventListener('click', (e) => {
  if (e.target === container || e.target === svg) {
    selectedNode = null;
    infoPanel.style.display = 'none';
    sectionKeys.forEach(k => {
      nodeElements[k].classList.remove('highlighted', 'dimmed');
    });
    render();
  }
});

// Search
searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  if (!q) {
    sectionKeys.forEach(k => nodeElements[k].classList.remove('dimmed', 'highlighted'));
    return;
  }
  sectionKeys.forEach(k => {
    const sec = sections[k];
    const match = k.includes(q) || sec.title.toLowerCase().includes(q) || sec.part.toLowerCase().includes(q) || (sec.div || '').toLowerCase().includes(q);
    nodeElements[k].classList.toggle('dimmed', !match);
    nodeElements[k].classList.toggle('highlighted', match);
  });
});

// Legend
const legendEl = document.getElementById('legend');
Object.entries(partColors).forEach(([part, color]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.style.background = color + '33';
  item.style.color = color;
  item.textContent = part.replace(/Part \d+: /, '');
  item.addEventListener('click', () => {
    searchInput.value = '';
    const members = sectionKeys.filter(k => sections[k].part === part);
    const memberSet = new Set(members);
    sectionKeys.forEach(k => {
      nodeElements[k].classList.toggle('dimmed', !memberSet.has(k));
      nodeElements[k].classList.toggle('highlighted', memberSet.has(k));
    });
    // Center on group
    if (members.length) {
      let cx = 0, cy = 0;
      members.forEach(k => { cx += nodePositions[k].x; cy += nodePositions[k].y; });
      cx /= members.length;
      cy /= members.length;
      pan.x = window.innerWidth / 2 - cx * zoom;
      pan.y = window.innerHeight / 2 - cy * zoom;
      render();
    }
  });
  legendEl.appendChild(item);
});

// Init
initialLayout();
createNodes();
resetView();
</script>
</body>
